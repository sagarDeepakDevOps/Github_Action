name: Workflow 1

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.gen_output.outputs.value }}

    steps:
      - id: gen_output
        run: echo "value=hello" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - run: echo "${{ needs.job1.outputs.value }}"